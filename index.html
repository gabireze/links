    <script>
      const copy = {
        "pt-BR": {
          title: "Gabriel de Rezende Goncalves | Links",
          description:
            "Links principais de Gabriel de Rezende Goncalves: portfolio, LinkedIn, GitHub e contato.",
          subtitle: "ENGENHEIRO DE SOFTWARE",
          bio: "Engenheiro de Software Full Stack com foco em Angular, Vue.js, Laravel, Python e arquitetura de solucoes. MBA em Arquitetura de Solucoes.",
          portfolio: "Portfolio",
          resume: "Baixar CV",
          linkedin: "LinkedIn",
          github: "GitHub",
          email: "Email",
          portfolioHref: "https://gabireze.com.br/",
          resumeHref: "https://gabireze.com.br/assets/pdf/curriculo.pdf",
          portfolioTitle: "Portfolio",
          resumeTitle: "Baixar CV",
          linkedinTitle: "LinkedIn",
          githubTitle: "GitHub",
          emailTitle: "Email"
        },
        en: {
          title: "Gabriel de Rezende Goncalves | Links",
          description:
            "Gabriel de Rezende Goncalves main links: portfolio, LinkedIn, GitHub, and contact.",
          subtitle: "SOFTWARE ENGINEER",
          bio: "Full Stack Software Engineer focused on Angular, Vue.js, Laravel, Python, and solution architecture. MBA in Solution Architecture.",
          portfolio: "Portfolio",
          resume: "Download Resume",
          linkedin: "LinkedIn",
          github: "GitHub",
          email: "Email",
          portfolioHref: "https://gabireze.com.br/en/",
          resumeHref: "https://gabireze.com.br/assets/pdf/resume.pdf",
          portfolioTitle: "Portfolio",
          resumeTitle: "Download Resume",
          linkedinTitle: "LinkedIn",
          githubTitle: "GitHub",
          emailTitle: "Email"
        }
      };

      const regionHints = ["America/Sao_Paulo", "America/Fortaleza", "America/Recife", "America/Maceio", "America/Bahia", "America/Belem", "America/Manaus", "America/Cuiaba", "America/Porto_Velho", "America/Boa_Vista", "America/Rio_Branco"];

      function detectLocale() {
        const saved = localStorage.getItem("preferredLocale");
        if (saved && copy[saved]) return saved;

        const languages = navigator.languages || [navigator.language || ""];
        const normalized = languages.map((item) => String(item).toLowerCase());
        const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone || "";

        const isBrazilLanguage = normalized.some(
          (item) => item === "pt-br" || item.startsWith("pt-br") || item === "pt"
        );
        const isBrazilTimezone = regionHints.includes(timezone);

        return isBrazilLanguage || isBrazilTimezone ? "pt-BR" : "en";
      }

      function applyLocale(locale) {
        const dictionary = copy[locale] || copy.en;
        document.documentElement.lang = locale;
        document.title = dictionary.title;

        const description = document.querySelector('meta[name="description"]');
        const ogDescription = document.querySelector('meta[property="og:description"]');
        const twitterDescription = document.querySelector('meta[name="twitter:description"]');
        const ogLocale = document.querySelector('meta[property="og:locale"]');

        if (description) description.content = dictionary.description;
        if (ogDescription) ogDescription.content = dictionary.description;
        if (twitterDescription) twitterDescription.content = dictionary.description;
        if (ogLocale) ogLocale.content = locale === "pt-BR" ? "pt_BR" : "en_US";

        document.querySelectorAll("[data-i18n]").forEach((node) => {
          const key = node.getAttribute("data-i18n");
          if (key && dictionary[key]) node.textContent = dictionary[key];
        });

        const portfolio = document.querySelector('[data-link="portfolio"]');
        const resume = document.querySelector('[data-link="resume"]');
        const linkedin = document.querySelector('[data-link="linkedin"]');
        const github = document.querySelector('[data-link="github"]');
        const email = document.querySelector('[data-link="email"]');

        if (portfolio) {
          portfolio.href = dictionary.portfolioHref;
          portfolio.title = dictionary.portfolioTitle;
        }
        if (resume) {
          resume.href = dictionary.resumeHref;
          resume.title = dictionary.resumeTitle;
        }
        if (linkedin) linkedin.title = dictionary.linkedinTitle;
        if (github) github.title = dictionary.githubTitle;
        if (email) email.title = dictionary.emailTitle;

        localStorage.setItem("preferredLocale", locale);
      }

      applyLocale(detectLocale());
    </script>
